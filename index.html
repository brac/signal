  const PLANET_TYPES = ['terrestrial','barren','gas_giant','gas_giant_storm','gas_giant_red','black_hole'];

  // Deterministic LCG for cloud generation — same seed → same cloud shape
  const seededRng = seed => {
    let s = (seed ^ 0xdeadbeef) >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
  };

  // Triadic dust-cloud palette: sky blue, mint green, lavender
  const CLOUD_COLS = [0x88ccff, 0x88ffcc, 0xcc88ff];
  // Softer versions used for ship tint
  const CLOUD_TINTS= [0xaaddff, 0xaaffee, 0xddaaff];

  function cfg() {
    if(depth===0) return {
      rarity:'HOME', sysName:'Home System',
      bg:0x05060f, stars:0xffffff, accent:0x3388cc,
      dockChance:1.0, hasSignals:false, planet:'terrestrial', alienChance:0, flavor:null,
    };
    const d=depth;
    const meta   = DEPTH_META[(d-1) % DEPTH_META.length];
    const colors = COLOR_THEMES[(d-1) % COLOR_THEMES.length];
    const flavor = FLAVORS[(d-1) % FLAVORS.length];
    const dockChance = Math.max(0.05, 0.90 * Math.pow(0.85, d-1));
    const alienChance = Math.min(0.70, 0.05*d + 0.03);
    const planet = PLANET_TYPES[(d-1) % PLANET_TYPES.length];
    return { ...colors, ...meta, dockChance, hasSignals:true, planet, alienChance, flavor };
  }

  let cargoUpgrades=0, jumpUpgrades=5; // DEV: start with lvl 5 jump drive
  let cloudTint=0; // 0–1 lerp for ship colour while inside cloud
  let homeExitFrames=0; // countdown that lifts max-speed cap after a home-jump exit

  const WARN_CYCLE  = 65;   // frames per warning pulse
  const WARN_RING   = 52;   // frames the warning ring expands + fades
  const CHARGE_DUR  = 45;   // pause between last warning and main flare
  const FLARE_EXP   = 115;  // frames for full expansion
  const FLARE_FADE  = 60;   // frames to fade after covering screen

    phase:'idle', timer:0, countdown:0,
    warnsNeeded:2, sx:0, sy:0, mainR:0, maxR:0,
  };
  const flareCountdown = () => Math.max(320, 800 - depth*28) + Math.random()*400;

  const BASE_ITEM_VALUE = 50;
  const MAX_CARGO_SLOTS = 10;
  const MAX_JUMP_UPGRADES = 9;  // 1 base + 9 = 10 depths max

  const itemValue = () => Math.floor(BASE_ITEM_VALUE * Math.pow(2, Math.max(0, depth - 1)));
  // Upgrade cost: 50, 100, 200, 300, 400 … (+100 each step after the second)
  const upgradeCost = level => level < 2 ? 50 * (level + 1) : level * 100;
  const cargoCapacity = () => 3 + cargoUpgrades;
  const jumpDepths    = () => 1 + jumpUpgrades;

  const systemStarContainer = new PIXI.Container();
  app.stage.addChild(systemStarContainer); // added first — renders behind everything
  let systemStarCore = null; // reference updated by buildSystemStar, pulsed each frame
  let starPulseT = 0;

  function buildSystemStar() {
    systemStarContainer.removeChildren();
    const c = cfg();

    // Tight atmospheric shimmer only — no wide halos
    const shimmer = new PIXI.Graphics();
    shimmer.circle(0,0,14);  shimmer.fill({color:c.stars,  alpha:0.06});
    shimmer.circle(0,0,8);   shimmer.fill({color:c.accent, alpha:0.15});
    shimmer.circle(0,0,5);   shimmer.fill({color:c.accent, alpha:0.28});
    // Very faint lens-flare cross
    shimmer.moveTo(-38,0); shimmer.lineTo(38,0);
    shimmer.stroke({color:c.accent, alpha:0.08, width:0.7});
    shimmer.moveTo(-22,-8); shimmer.lineTo(22,8);
    shimmer.stroke({color:c.stars,  alpha:0.06, width:0.5});

    // Hard bright point — pulsed via .alpha each frame
    const core = new PIXI.Graphics();
    core.circle(0,0,5);   core.fill({color:0xffffff, alpha:0.98});
    core.circle(0,0,2.5); core.fill({color:0xffffff, alpha:1.00});

    systemStarContainer.addChild(shimmer, core);
    systemStarCore = core;
  }

    {count:120,parallax:0.20,sizeMin:0.4,sizeMax:1.0,alphaMin:0.15,alphaMax:0.45},

  ];
  const starLayers = LAYER_DEFS.map(cfg_s => {
    const container = new PIXI.Container();
    app.stage.addChild(container);
    const stars = Array.from({length:cfg_s.count}, () => {
      const g = new PIXI.Graphics();
      g.circle(0,0,rand(cfg_s.sizeMin,cfg_s.sizeMax)); g.fill({color:0xffffff});
      g.alpha=rand(cfg_s.alphaMin,cfg_s.alphaMax);
      g.x=rand(0,app.screen.width); g.y=rand(0,app.screen.height);
      container.addChild(g); return g;
    });
    return {cfg:cfg_s, stars, container};
  });

  const warpFx = new PIXI.Graphics();

  // ─── Dust cloud ──────────────────────────────────────────
  function buildCloudGraphics(seed, radius) {
    cloudContainer.removeChildren();
    const rng = seededRng(seed);
    const g = new PIXI.Graphics();

    // Three large soft base layers, one per color
    for(let i=0;i<3;i++){
      const r=radius*(0.6+rng()*0.4);
      const ox=(rng()-0.5)*radius*0.22; const oy=(rng()-0.5)*radius*0.22;
      g.ellipse(ox,oy,r,r*(0.75+rng()*0.25));
      g.fill({color:CLOUD_COLS[i],alpha:0.028+rng()*0.018});
    }
    // Medium blobs
    for(let i=0;i<65;i++){
      const a=rng()*Math.PI*2, d=Math.sqrt(rng())*radius*0.88;
      const r=radius*(0.055+rng()*0.17);
      const col=CLOUD_COLS[Math.floor(rng()*3)];
      g.circle(Math.cos(a)*d,Math.sin(a)*d,r);
      g.fill({color:col,alpha:0.025+rng()*0.065});
    }
    // Small dense wisps
    for(let i=0;i<110;i++){
      const a=rng()*Math.PI*2, d=Math.pow(rng(),0.55)*radius*0.82;
      const r=radius*(0.012+rng()*0.055);
      const col=CLOUD_COLS[Math.floor(rng()*3)];
      g.circle(Math.cos(a)*d,Math.sin(a)*d,r);
      g.fill({color:col,alpha:0.04+rng()*0.08});
    }
    // Bright concentrated knots
    for(let i=0;i<28;i++){
      const a=rng()*Math.PI*2, d=Math.pow(rng(),0.7)*radius*0.65;
      const r=radius*(0.006+rng()*0.022);
      const col=CLOUD_COLS[Math.floor(rng()*3)];
      g.circle(Math.cos(a)*d,Math.sin(a)*d,r);
      g.fill({color:col,alpha:0.12+rng()*0.18});
    }
    cloudContainer.addChild(g);
  }

  // ─── Warp / jump ─────────────────────────────────────────
  function activateWarp(dest){
    if(warp.active||warpCooldown>0)return;
    if(sig.phase==='scanning'||sig.phase==='card'||dock.active)return;
    if(dest==='home'&&depth===0)return;
    if(dest==='home'){const cost=depth*FUEL_HOME_PER_DEPTH;if(fuel<cost)return;fuel=Math.max(0,fuel-cost);}
    else{fuel=Math.max(0,fuel-FUEL_PER_JUMP);}
    updateDepthFuelHUD();
    warp.active=true;warp.timer=0;warp.dest=dest;warp.duration=warpDuration();
    scanPrompt.visible=false;dockPrompt.visible=false;
    warp.vx=Math.sin(ship.angle)*WARP_SPEED;warp.vy=-Math.cos(ship.angle)*WARP_SPEED;
    ship.vx=warp.vx;ship.vy=warp.vy;
  }

  function completeJump(){
    warp.active=false;warp.flashAlpha=1.0;warpCooldown=WARP_COOLDOWN;
    depth=warp.dest==='home'?0:depth+jumpDepths();
    ship.wx=0;ship.wy=0;ship.vx=0;ship.vy=0;
    cloudTint=0;shipContainer.tint=0xffffff;shipContainer.scale.set(1,1);
    if(warp.dest==='home'){
      // Spat out in the direction the ship was facing — high velocity + heavy tumble
      const spd=18+Math.random()*12; // 18–30 u/frame
      ship.vx=Math.sin(ship.angle)*spd; ship.vy=-Math.cos(ship.angle)*spd;
      // 2–3 full rotations: spin_0 / (1-0.976) ≈ spin_0 * 41.7 total radians
      ship.spin=(Math.random()<0.5?1:-1)*(0.30+Math.random()*0.15);
      homeExitFrames=120; // 2 s of lifted speed cap
    } else { ship.spin=0; homeExitFrames=0; }
    spawnSystem();applyDepthTheme();updateDepthFuelHUD();
    if(fuel<=0)warp.pendingGameOver=true;
  }

  function completeGhostScan() {
    gScan.active=false; progressBar.visible=false;
    // Grab credits before removing the record
    const ghostRecord=ghostShips.find(g=>g.id===gScan.id);
    const recoveredCr=(ghostRecord&&ghostRecord.credits)||0;
    // Remove from persistence
    ghostShips=ghostShips.filter(g=>g.id!==gScan.id);
    try{ localStorage.setItem('signal_ghosts',JSON.stringify(ghostShips)); }catch(_){}
    // Remove from world
    const ag=activeGhosts.find(g=>g.id===gScan.id);
    if(ag){ ghostLayer.removeChild(ag.container); activeGhosts=activeGhosts.filter(g=>g.id!==gScan.id); }
    nearGhost=null;
    if(recoveredCr>0){ credits+=recoveredCr; updateCreditsHud(); }
    // Give cargo item
    const slot=ship.cargo.findIndex(s=>s===null);
    if(slot!==-1){ ship.cargo[slot]='Ship Loot'; refreshCargoHud(); }
    // Show ghost result card
    const fmt=n=>n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1000?`${(n/1000).toFixed(1)}k`:n.toLocaleString();
    ghostCardPrevSigPhase=sig.phase; cardType='ghost'; sig.phase='card';

    cardTitle.text='"SHIP LOOT" SECURED';
    cardBody.text='Emergency fuel cells found intact.\nWorth a full tank when sold.';
    const crLine=recoveredCr>0?`▸ ${fmt(recoveredCr)} cr recovered from pilot`:'▸ No credits found on wreck';
    cardCargoLine.text=(slot!==-1?'▸ Ship Loot added to cargo\n':'▸ Cargo full — no room for loot\n')+crLine;
    cardCargoLine.style.fill=slot!==-1?'#66cc88':'#cc6644';
    cardLayer.visible=true;
  }

    warp.active=false;warp.flashAlpha=0;warp.pendingGameOver=false;
    warpCooldown=0;dock.active=false;
    cardLayer.visible=false;dockLayer.visible=false;shipyardLayer.visible=false;gameOverLayer.visible=false;
    cardType='signal'; scanMode='signal'; nearGhost=null;
    clearGhosts();
    refreshCargoHud();updateCreditsHud();applyDepthTheme();spawnSystem();updateDepthFuelHUD();
  }

  // ─── Solar flare update ───────────────────────────────────
  function updateFlare(dt) {
    flareFx.clear();
    flare.timer += dt;

    const col    = cfg().accent;
    const colStr = `#${col.toString(16).padStart(6,'0')}`;

    // ── Idle: wait for countdown ──
    if(flare.phase==='idle'){
      flare.countdown -= dt;
      if(flare.countdown <= 0){
        flare.phase      = 'warn';
        flare.timer      = 0;
        flare.warnsNeeded= 2 + Math.floor(Math.random()*2); // 2 or 3
        flare.sx         = systemStarContainer.x;
        flare.sy         = systemStarContainer.y;
      }
      return;
    }

    // ── Warn: N sequential pulsing rings ──
    if(flare.phase==='warn'){
      const totalWarn = flare.warnsNeeded * WARN_CYCLE;
      if(flare.timer >= totalWarn){
        flare.phase='charge'; flare.timer=0; return;
      }
      // Draw each pulse ring that has started
      for(let i=0;i<flare.warnsNeeded;i++){
        const age = flare.timer - i*WARN_CYCLE;
        if(age<0||age>WARN_RING) continue;
        const p = age/WARN_RING;              // 0→1
        const r = 6 + p*110;                 // ring radius
        const a = (1-p)*(0.55-i*0.05);       // fades as it expands; later pulses slightly fainter
        flareFx.circle(flare.sx, flare.sy, r);
        flareFx.stroke({color:col, alpha:a, width:2.5-p*1.5});
        // Bright core flash at the star for the first ~15 frames of each pulse
        if(age<15 && systemStarCore){
          const flash=(1-(age/15));
          systemStarCore.alpha=0.9+flash*0.8; // briefly spike brightness
        }
      }
      return;
    }

    // ── Charge: silent pause before the main event ──
    if(flare.phase==='charge'){
      if(flare.timer>=CHARGE_DUR){ flare.phase='main'; flare.timer=0;
        flare.maxR=Math.ceil(Math.max(
          Math.hypot(flare.sx, flare.sy),
          Math.hypot(app.screen.width-flare.sx, flare.sy),
          Math.hypot(flare.sx, app.screen.height-flare.sy),
          Math.hypot(app.screen.width-flare.sx, app.screen.height-flare.sy)
        ))+10;
      }
      return;
    }

    // ── Main flare: expands to fill the entire screen ──
    if(flare.phase==='main'){
      if(flare.timer>=FLARE_EXP){ flare.phase='fade'; flare.timer=0; return; }
      const t  = flare.timer/FLARE_EXP;
      const p  = Math.pow(t, 0.55);               // eased progress 0→1
      flare.mainR = flare.maxR * p;

      // Colour fill behind the wavefront — brightens as ring spreads
      flareFx.circle(flare.sx, flare.sy, flare.mainR);
      flareFx.fill({color:col, alpha: p*0.22});

      // White tint — peaks when ring covers screen
      flareFx.circle(flare.sx, flare.sy, flare.mainR);
      flareFx.fill({color:0xffffff, alpha: p*0.13});

      // Wavefront ring — bright, thickens as it expands
      flareFx.circle(flare.sx, flare.sy, flare.mainR);
      flareFx.stroke({color:0xffffff, alpha:0.55+p*0.40, width:3+p*14});

      return;
    }

    // ── Fade: screen returns to normal ──
    if(flare.phase==='fade'){
      if(flare.timer>=FLARE_FADE){
        flare.phase='idle'; flare.timer=0;
        flare.countdown=flareCountdown();
        return;
      }
      const f = 1 - flare.timer/FLARE_FADE;       // 1→0

      flareFx.circle(flare.sx, flare.sy, flare.maxR);
      flareFx.fill({color:col, alpha:f*0.22});

      flareFx.circle(flare.sx, flare.sy, flare.maxR);
      flareFx.fill({color:0xffffff, alpha:f*0.13});

      flareFx.circle(flare.sx, flare.sy, flare.maxR);
      flareFx.stroke({color:0xffffff, alpha:f*0.95, width:3+14*f});
    }
  }

  // ─── Boot ────────────────────────────────────────────────
  let pulseTime=0;
  applyDepthTheme(); // also calls buildSystemStar + positionUI fires on resize
  spawnSystem();
  updateDepthFuelHUD();

  // ─── Game loop ───────────────────────────────────────────
  const SIG_VIS=700,ARRIVAL=200,SCAN_R=100,DOCK_R=90,SCAN_DUR=3*60;
  let padBlink=0;

  app.ticker.add(ticker=>{
    const dt=ticker.deltaTime;
    const uiLock=sig.phase==='scanning'||sig.phase==='card'||dock.active||gameOverLayer.visible;
    const inLock=uiLock||warp.active;

    // Cloud state — computed before physics so it can affect thrust/speed this frame
    const inCloud = cloud.active && !warp.active &&
      Math.hypot(ship.wx-cloud.wx, ship.wy-cloud.wy) < cloud.radius;
    const cloudMult = inCloud ? 0.42 : 1.0;

    if(!inLock){
      let rot=0;
      if(pressed('ArrowLeft','a'))rot-=1;if(pressed('ArrowRight','d'))rot+=1;
      if(jState.active)rot+=jState.dx;
      ship.angle+=rot*ROTATE_SPEED*dt;
      const thr=pressed('ArrowUp','w')||tState.active;
      if(thr){ship.vx+=Math.sin(ship.angle)*THRUST*cloudMult*dt;ship.vy-=Math.cos(ship.angle)*THRUST*cloudMult*dt;}
      flameGfx.visible=thr;
      if(thr){flameGfx.alpha=0.65+0.35*Math.random();flameGfx.scale.y=0.85+0.30*Math.random();}
    }else{flameGfx.visible=false;}

    if(warp.active&&!uiLock){
      warp.timer+=dt;
      if(warp.dest==='home'){
        // Accelerate stars — cubic ramp up to 5× warp speed
        const t=warp.timer/warp.duration;
        const accel=1+t*t*t*4;
        ship.vx=warp.vx*accel; ship.vy=warp.vy*accel;
      }else{
        ship.vx=warp.vx;ship.vy=warp.vy;
      }
      if(warp.timer>=warp.duration)completeJump();
    }else if(!uiLock){
      if(warpCooldown>0)warpCooldown=Math.max(0,warpCooldown-dt);
      const drag=Math.pow(DRAG,dt);ship.vx*=drag;ship.vy*=drag;
    }
    const spd=Math.hypot(ship.vx,ship.vy);
    // After home exit, max speed ramps from 3× down to normal over 2 s
    if(homeExitFrames>0)homeExitFrames=Math.max(0,homeExitFrames-dt);
    const exitMult=homeExitFrames>0?1+2*(homeExitFrames/120):1;
    const maxSpd=inCloud?MAX_SPEED*0.38:MAX_SPEED*exitMult;
    if(!warp.active&&spd>maxSpd){ship.vx=ship.vx/spd*maxSpd;ship.vy=ship.vy/spd*maxSpd;}
    ship.wx+=ship.vx;ship.wy+=ship.vy;

    // Post-hyperspace tumble — spin decays each frame
    if(ship.spin!==0&&!uiLock){
      ship.angle+=ship.spin*dt;
      ship.spin*=Math.pow(0.976,dt);
      if(Math.abs(ship.spin)<0.0002)ship.spin=0;
    }
    shipContainer.rotation=ship.angle;

    // Irregular star twinkle — three incommensurable frequencies, no perceived rhythm
    starPulseT+=dt*0.012;
    if(systemStarCore){
      const p=Math.sin(starPulseT)*0.45+Math.sin(starPulseT*1.732+1.1)*0.35+Math.sin(starPulseT*2.618+2.4)*0.20;
      systemStarCore.alpha=0.78+p*0.22; // roughly 0.73 – 1.00
    }

    // Home-warp stretch: parabolic (t^4 keeps ship normal-looking until the final surge)
    if(warp.active&&warp.dest==='home'){
      const t=warp.timer/warp.duration;
      const maxS=app.screen.width/40;
      const s=1+(maxS-1)*Math.pow(t,4);
      shipContainer.scale.set(Math.max(0.12,1/Math.sqrt(s)),s);
    }else{
      shipContainer.scale.set(1,1);
    }

    for(const{cfg:c,stars}of starLayers){
      const sx=ship.vx*c.parallax,sy=ship.vy*c.parallax;
      const W=app.screen.width,H=app.screen.height;
      for(const s of stars){
        s.x-=sx;s.y-=sy;
        if(s.x<-4)s.x+=W+8;else if(s.x>W+4)s.x-=W+8;
        if(s.y<-4)s.y+=H+8;else if(s.y>H+4)s.y-=H+8;
      }
    }

    // Warp motion-blur streaks
    if(warp.active){
      warpFx.clear();
      const starCol = cfg().stars;
      // Ramp alpha up in first 12 frames, hold, fade out in last 20
      const ramp = Math.min(1, warp.timer/12) * Math.min(1,(warp.duration-warp.timer)/20);
      for(const{cfg:lc,stars,container}of starLayers){
        // Trail extends back to where each star was ~2.5 frames ago
        const tx = warp.vx * lc.parallax * 2.5;
        const ty = warp.vy * lc.parallax * 2.5;
        const sw = (lc.sizeMin+lc.sizeMax)*0.35;
        const la = (lc.alphaMin+lc.alphaMax)*0.5 * ramp;
        container.alpha = 1 - ramp * 0.55; // dim dots as streaks appear
        for(const s of stars){
          warpFx.moveTo(s.x, s.y);
          warpFx.lineTo(s.x+tx, s.y+ty);
        }
        warpFx.stroke({color:starCol, alpha:la, width:sw});
      }
    }else{
      warpFx.clear();
      for(const{container}of starLayers) container.alpha=1;
    }

    // System star — world position with tiny parallax, shrinks during jump
    systemStarContainer.x=app.screen.width/2  + (sysStar.wx-ship.wx)*STAR_PARALLAX;
    systemStarContainer.y=app.screen.height/2 + (sysStar.wy-ship.wy)*STAR_PARALLAX;
    if(warp.active){
      const t=warp.timer/warp.duration;
      systemStarContainer.scale.set(Math.max(0.04, 1-Math.pow(t,0.7)*0.96));
    }else{
      systemStarContainer.scale.set(1);
    }

    // ── Cloud ──
    if(cloud.active){
      cloudContainer.x=app.screen.width/2+(cloud.wx-ship.wx);
      cloudContainer.y=app.screen.height/2+(cloud.wy-ship.wy);
    }
    if(inCloud&&!uiLock){
      const dmgPerSec=Math.max(0.6,(depth-3)*0.55);
      hull=Math.max(0,hull-dmgPerSec/60*dt);
      refreshHullHud();
      if(hull<=0&&!gameOverLayer.visible) showGameOver('hull');
    }
    // Smooth ship colour tint into/out of cloud
    cloudTint+=(((inCloud&&cloud.active)?1:0)-cloudTint)*Math.min(1,dt*0.04);
    if(cloudTint>0.005){
      const ct=cloudTint;
      const dr=(cloud.domTint>>16)&0xff, dg=(cloud.domTint>>8)&0xff, db=cloud.domTint&0xff;
      const r=Math.round(255*(1-ct)+dr*ct);
      const g=Math.round(255*(1-ct)+dg*ct);
      const b=Math.round(255*(1-ct)+db*ct);
      shipContainer.tint=(r<<16)|(g<<8)|b;
    }else{shipContainer.tint=0xffffff;}

    // Planet
    if(systemHasPlanet){
      const pdx=planet.wx-ship.wx,pdy=planet.wy-ship.wy;
      planetContainer.x=app.screen.width/2+pdx;planetContainer.y=app.screen.height/2+pdy;
      const pd=Math.hypot(pdx,pdy);
      pHudArrow.rotation=Math.atan2(pdx,-pdy);
      planetDistT.text=pd>=1000?`${(pd/1000).toFixed(1)}ku`:`${Math.round(pd)}u`;
      padBlink+=dt*0.06;padContainer.alpha=0.55+0.45*Math.abs(Math.sin(padBlink));
      const paDist=Math.hypot(pad.wx-ship.wx,pad.wy-ship.wy);
      dockPrompt.visible=!dock.active&&!dockLayer.visible&&paDist<DOCK_R&&!gameOverLayer.visible&&!warp.active;
    }else{dockPrompt.visible=false;}

    // ── Ghost ships ──
    nearGhost = null;
    let nearGhostDist = Infinity;
    for(const g of activeGhosts){
      const gdx=g.wx-ship.wx, gdy=g.wy-ship.wy;
      g.container.x=app.screen.width/2+gdx;
      g.container.y=app.screen.height/2+gdy;
      // Pulse animation on the two rings (children 0 and 1)
      g.pulse+=dt*0.025;
      const p=(Math.sin(g.pulse)+1)/2;
      g.container.children[0].alpha=0.10+0.25*p;
      g.container.children[1].alpha=0.30+0.40*p;
      g.container.children[0].scale.set(1+0.12*p);
      const d=Math.hypot(gdx,gdy);
      if(d<SCAN_R&&d<nearGhostDist){ nearGhost=g; nearGhostDist=d; }
    }
    // Ghost-priority HUD compass
    if(activeGhosts.length>0&&hudC.visible){
      let ng=activeGhosts[0], nd=Infinity;
      for(const g of activeGhosts){ const d=Math.hypot(g.wx-ship.wx,g.wy-ship.wy); if(d<nd){nd=d;ng=g;} }
      applyHudMode('ghost');
      hudArrow.rotation=Math.atan2(ng.wx-ship.wx,-(ng.wy-ship.wy));
      distText.text=nd>=1000?`${(nd/1000).toFixed(1)}ku`:`${Math.round(nd)}u`;
      sigLabel.text='GHOST';
    } else if(activeGhosts.length===0&&hudMode==='ghost'){
      applyHudMode('signal');
    }
    // Ghost scan in progress
    if(gScan.active&&!uiLock){
      gScan.progress+=dt/SCAN_DUR;
      if(gScan.progress>=1){gScan.progress=1;completeGhostScan();}
      progFill.clear();
      progFill.roundRect(-PROG_W/2,-PROG_H/2,PROG_W*gScan.progress,PROG_H,5);
      progFill.fill({color:0xff5533});
    }
    // Ghost scan prompt (only when no other modal and not already scanning)
    if(!gScan.active&&nearGhost&&!dock.active&&!dockLayer.visible&&!cardLayer.visible&&!gameOverLayer.visible&&sig.phase!=='scanning'&&!warp.active){
      scanPrompt.visible=true;
      scanVerb.text='SALVAGE';
      scanMode='ghost';
    } else if(scanMode==='ghost'&&(!nearGhost||gScan.active)){
      if(!nearGhost&&!gScan.active) scanPrompt.visible=false;
      scanMode='signal';
    }

    // Signal
    if(systemHasSignals&&sig.phase!=='idle'){
      const sdx=signal.wx-ship.wx,sdy=signal.wy-ship.wy;
      const dist=Math.hypot(sdx,sdy);
      signalContainer.x=app.screen.width/2+sdx;signalContainer.y=app.screen.height/2+sdy;

      if(sig.phase==='signal'){
        signalContainer.alpha=dist<SIG_VIS?Math.min(1,(SIG_VIS-dist)/200):0;
        if(dist<ARRIVAL)reveal();
        pulseTime+=dt*0.022;
        const p1=(Math.sin(pulseTime)+1)/2,p2=(Math.sin(pulseTime+2.1)+1)/2,p3=(Math.sin(pulseTime*1.3+1)+1)/2;
        sweepRing.alpha=0.08+0.18*p1;sweepRing.scale.set(1+0.18*p1);
        midRing.alpha=0.25+0.35*p2;midRing.scale.set(1+0.08*p2);
        innerRing.alpha=0.55+0.45*p3;centreGlow.alpha=0.18+0.22*p1;qMark.alpha=0.55+0.45*p3;
        // Only update signal arrow when no ghosts are claiming the compass
        if(activeGhosts.length===0){
          applyHudMode('signal');
          hudArrow.rotation=Math.atan2(sdx,-sdy);
          distText.text=dist>=1000?`${(dist/1000).toFixed(1)}ku`:`${Math.round(dist)}u`;
        }
      }else if(sig.phase==='revealed'){
        signalContainer.alpha=1;
        if(sig.type==='alien'){pulseTime+=dt*0.022;revealedContainer.rotation+=alienRotSpeed*dt;revealedContainer.alpha=0.82+0.18*Math.sin(pulseTime*2.5);}
        else if(sig.type==='derelict'&&flickerParts.length){if(Math.random()<0.04){const a=rand(0.25,1);flickerParts.forEach(p=>p.alpha=a);}}
        // Only show signal prompt if ghost isn't already claiming it
        if(scanMode!=='ghost'){
          scanPrompt.visible=dist<SCAN_R&&!gameOverLayer.visible&&!warp.active;
          if(dist<SCAN_R) scanMode='signal';
        }
      }else if(sig.phase==='scanning'){
        signalContainer.alpha=1;
        if(sig.type==='alien'){pulseTime+=dt*0.022;revealedContainer.rotation+=alienRotSpeed*dt;}
        sig.scanProgress+=dt/SCAN_DUR;
        if(sig.scanProgress>=1){sig.scanProgress=1;completeScan();}
        progFill.clear();
        if(sig.scanProgress>0){progFill.roundRect(-PROG_W/2,-PROG_H/2,PROG_W*sig.scanProgress,PROG_H,5);progFill.fill({color:TYPE_COLOR[sig.type]});}
      }else if(sig.phase==='card'){signalContainer.alpha=1;}
    }

    // Solar flare
    if(depth>=2&&!warp.active) updateFlare(dt);
    else flareFx.clear();

    // Warp button feedback
    const wr=!warp.active&&warpCooldown<=0;
    warpBtn.alpha=uiLock?0.25:warp.active?1.0:wr?0.75:0.2+0.55*(1-warpCooldown/WARP_COOLDOWN);
    thrustBtnGfx.alpha=tState.active?1.0:0.65;

    // Warp overlay
    warpOverlay.clear();
    const W2=app.screen.width,H2=app.screen.height;
    if(warp.active){
      const t=1-warp.timer/warp.duration;
      warpOverlay.rect(3,3,W2-6,H2-6);warpOverlay.stroke({color:0x00ccff,alpha:0.55*t,width:10});
      warpOverlay.rect(16,16,W2-32,H2-32);warpOverlay.stroke({color:0x00ccff,alpha:0.25*t,width:5});
    }else if(warp.flashAlpha>0){
      warp.flashAlpha=Math.max(0,warp.flashAlpha-dt*0.045);
      warpOverlay.rect(0,0,W2,H2);warpOverlay.fill({color:0xffffff,alpha:warp.flashAlpha*0.85});
      if(warp.flashAlpha<=0&&warp.pendingGameOver){warp.pendingGameOver=false;showGameOver();}
    }
  });

  window.addEventListener('resize',()=>{positionShip();positionUI();});
</script>
</body>
</html>
